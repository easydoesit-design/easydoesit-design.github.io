# Site Build Settings

# jekyll-paginate configuration
paginate:            5

# Build settings
markdown:            kramdown
highlighter:         rouge
permalink:           /:title
plugins:             [jekyll-paginate, jekyll-sitemap, jekyll-feed, jekyll-seo-tag, jekyll-remote-theme]
remote_theme: b2a3e8/jekyll-theme-console

# Customise atom feed settings (this is where Jekyll-Feed gets configuration information)
title:		           "Andras Pokorny"
description:	       "designer"
author:              ""

style: light   # try light first, we can tune later

header_pages:
  - index.md
  - about.md
  - projects.md
  - writing.md

footer: ":: work in progress ::"


# RSS 2.0 can be used instead of Atom by uncommenting following two lines
#feed:
#  path: rss-feed.xml
